<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon or Medicine?</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="game-card">
        <p class="eyebrow">Guessing Game</p>
        <h1>Pokémon or Medicine?</h1>
        <p class="instructions">
          A random name appears each round. Decide whether it belongs to a
          Pokémon or a medicine, then move to the next round and build your
          score.
        </p>

        <section class="scoreboard" aria-label="Scoreboard">
          <div class="score-item">
            <span class="score-label">Score</span>
            <span id="score" class="score-value">0</span>
          </div>
          <div class="score-item">
            <span class="score-label">Rounds Played</span>
            <span id="rounds-played" class="score-value">0</span>
          </div>
        </section>

        <section class="play-area" aria-live="polite">
          <div id="name-display" class="name-display">Loading...</div>
          <p id="feedback" class="feedback">Choose an answer to start.</p>
          <figure id="image-panel" class="image-panel" hidden>
            <img id="item-image" class="item-image" src="" alt="" />
          </figure>
        </section>

        <div class="button-row guess-buttons">
          <button id="pokemon-button" class="primary-button" type="button">
            Pokémon
          </button>
          <button id="medicine-button" class="primary-button" type="button">
            Medicine
          </button>
        </div>

        <div class="button-row utility-buttons">
          <button id="next-button" class="secondary-button" type="button" disabled>
            Next Round
          </button>
          <button id="restart-button" class="secondary-button" type="button">
            Restart Game
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
